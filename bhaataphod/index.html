    <main class="container bhaataphod-page">
      <section class="bhaataphod-hero">
        <div class="bhaataphod-toolbar" aria-label="Game controls">
          <button type="button" class="bhaataphod-control-button" id="fullscreenButton">
            <i class="fas fa-expand"></i>
            <span>Fullscreen</span>
          </button>
          <button type="button" class="bhaataphod-control-button secondary" id="muteGameButton" aria-pressed="false">
            <i class="fas fa-volume-high"></i>
            <span>Mute</span>
          </button>
          <button type="button" class="bhaataphod-control-button secondary" id="restartGameButton">
            <i class="fas fa-rotate-right"></i>
            <span>Restart</span>
          </button>
        </div>
      </section>

      <section class="bhaataphod-shell" aria-label="BhaataPhod browser game">
        <div class="bhaataphod-stage">
          <canvas class="bhaataphod-canvas" id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
          <div class="bhaataphod-status" id="statusPanel">
            <div class="bhaataphod-spinner" id="spinner" aria-hidden="true"></div>
            <div class="bhaataphod-status-text" id="status">Downloading...</div>
            <progress class="bhaataphod-progress" id="progress" max="100" value="0" hidden></progress>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" id="footer-container">

    <button id="topbutton" onclick="scrollToTop()" class="top-button">
      <i class="fa-solid fa-circle-arrow-up"></i>
    </button>
    <button type="button" class="bhaataphod-exit-focus" id="exitFocusButton" hidden>
      <i class="fas fa-compress"></i>
      <span>Show Page</span>
    </button>

    <script>
      var Module;

      (function () {
        var statusElement = document.getElementById("status");
        var statusPanel = document.getElementById("statusPanel");
        var progressElement = document.getElementById("progress");
        var spinnerElement = document.getElementById("spinner");
        var canvasElement = document.getElementById("canvas");
        var stageElement = document.querySelector(".bhaataphod-stage");
        var shellElement = document.querySelector(".bhaataphod-shell");
        var exitFocusButton = document.getElementById("exitFocusButton");
        var muteGameButton = document.getElementById("muteGameButton");
        var statusState = { time: Date.now(), text: "" };
        var isGameReady = false;
        var isGameMuted = localStorage.getItem("bhaataphod-muted") === "true";

        function getGameAudioContext() {
          return (window.SDL2 && window.SDL2.audioContext) ||
            (window.Module && window.Module.SDL2 && window.Module.SDL2.audioContext) ||
            null;
        }

        function updateMuteButton() {
          muteGameButton.setAttribute("aria-pressed", String(isGameMuted));
          muteGameButton.querySelector("i").className = isGameMuted ? "fas fa-volume-xmark" : "fas fa-volume-high";
          muteGameButton.querySelector("span").textContent = isGameMuted ? "Unmute" : "Mute";
        }

        function applyMuteState(allowResume) {
          var context = getGameAudioContext();
          if (!context) {
            return;
          }

          if (isGameMuted && context.state !== "suspended") {
            context.suspend().catch(function () {});
          } else if (!isGameMuted && allowResume && context.state === "suspended") {
            context.resume().catch(function () {});
          }
        }

        function setStatus(text) {
          if (text === statusState.text) {
            return;
          }

          var match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (match && now - statusState.time < 30) {
            return;
          }

          statusState.time = now;
          statusState.text = text;

          if (match) {
            progressElement.value = parseInt(match[2], 10);
            progressElement.max = parseInt(match[4], 10);
            progressElement.hidden = false;
            text = match[1].trim();
          } else {
            progressElement.value = 0;
            progressElement.max = 100;
            progressElement.hidden = true;
          }

          if (!text) {
            spinnerElement.style.display = "none";
            statusPanel.classList.add("is-hidden");
            isGameReady = true;
            applyMuteState();
            return;
          }

          spinnerElement.style.display = "block";
          statusPanel.classList.remove("is-hidden");
          statusElement.textContent = text;
        }

        function fitFocusedGame() {
          if (!document.body.classList.contains("bhaataphod-focus-mode")) {
            return;
          }

          var shellStyle = window.getComputedStyle(shellElement);
          var shellPaddingX = parseFloat(shellStyle.paddingLeft) + parseFloat(shellStyle.paddingRight);
          var shellPaddingY = parseFloat(shellStyle.paddingTop) + parseFloat(shellStyle.paddingBottom);
          var viewportPadding = window.innerWidth <= 560 ? 12 : 24;
          var availableWidth = Math.max(320, window.innerWidth - viewportPadding);
          var availableHeight = Math.max(240, window.innerHeight - viewportPadding);
          var stageWidth = Math.min(availableWidth - shellPaddingX, (availableHeight - shellPaddingY) * (16 / 9));
          var stageHeight = stageWidth * (9 / 16);
          shellElement.style.width = Math.max(320, stageWidth + shellPaddingX) + "px";
          stageElement.style.height = stageHeight + "px";
          stageElement.style.aspectRatio = "auto";
        }

        function setFocusMode(active) {
          document.body.classList.toggle("bhaataphod-focus-mode", active);
          exitFocusButton.hidden = !active;

          if (active) {
            canvasElement.focus({ preventScroll: true });
            requestAnimationFrame(fitFocusedGame);
          } else {
            shellElement.style.width = "";
            stageElement.style.height = "";
            stageElement.style.aspectRatio = "";
          }
        }

        function enterFocusModeWhenReady() {
          if (isGameReady) {
            setFocusMode(true);
          } else {
            canvasElement.focus();
          }
        }

        canvasElement.addEventListener("webglcontextlost", function (event) {
          setStatus("WebGL context lost. Reload the page.");
          event.preventDefault();
        }, false);

        stageElement.addEventListener("pointerdown", function () {
          enterFocusModeWhenReady();
        });

        document.addEventListener("keydown", function (event) {
          if (document.activeElement === canvasElement && [" ", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(event.key) !== -1) {
            event.preventDefault();
          }
          if (document.activeElement === canvasElement) {
            enterFocusModeWhenReady();
          }
        }, true);

        Module = {
          canvas: canvasElement,
          setStatus: setStatus,
          totalDependencies: 0,
          locateFile: function (path) {
            return path;
          },
          print: function () {
            console.log.apply(console, arguments);
          },
          monitorRunDependencies: function (left) {
            this.totalDependencies = Math.max(this.totalDependencies, left);
            setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
          }
        };
        window.Module = Module;

        document.getElementById("fullscreenButton").addEventListener("click", function () {
          setFocusMode(true);
          canvasElement.focus();
          if (document.pointerLockElement && document.exitPointerLock) {
            document.exitPointerLock();
          }
          if (Module.requestFullscreen) {
            Module.requestFullscreen(false, true);
          } else if (canvasElement.requestFullscreen) {
            canvasElement.requestFullscreen();
          }
        });

        document.getElementById("restartGameButton").addEventListener("click", function () {
          window.location.reload();
        });

        muteGameButton.addEventListener("click", function () {
          isGameMuted = !isGameMuted;
          localStorage.setItem("bhaataphod-muted", String(isGameMuted));
          updateMuteButton();
          applyMuteState(true);
        });

        exitFocusButton.addEventListener("click", function () {
          setFocusMode(false);
        });

        window.addEventListener("resize", fitFocusedGame);
        updateMuteButton();
        window.setInterval(applyMuteState, 750);

        document.addEventListener("fullscreenchange", function () {
          if (document.fullscreenElement) {
            setFocusMode(true);
            canvasElement.style.cursor = "crosshair";
          } else {
            requestAnimationFrame(fitFocusedGame);
          }
        });

        setStatus("Downloading...");

        window.onerror = window.onunhandledrejection = function () {
          setStatus("Exception thrown, see JavaScript console.");
          spinnerElement.style.display = "none";
        };
      }());
    </script>
    <script async src="bhaataphod.js"></script>
    <script type="text/javascript" src="/main.js"></script>
