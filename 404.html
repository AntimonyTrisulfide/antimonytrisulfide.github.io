<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0a0a0f 0%, #0f1419 50%, #1a1a2e 100%);
        font-family: 'Karma', Arial, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: #ecf0f1;
      }
      
      /* General hover effects for all clickable elements */
      a:hover, button:hover, [onclick]:hover, input[type="button"]:hover, input[type="submit"]:hover {
        filter: drop-shadow(0 0 20px rgba(52, 152, 219, 1.0));
      }
      
      .content {
        text-align: center;
        max-width: 600px;
        padding: 20px;
        background: rgba(10, 10, 15, 0.9);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(52, 152, 219, 0.2);
      }
      
      h1 {
        color: #3498db;
        font-size: 3rem;
        margin: 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
      
      p {
        color: #bdc3c7;
        font-size: 1.2rem;
        margin: 20px 0;
      }
      
      .gif-container {
        margin: 30px 0;
      }
      
      .gif-container img {
        max-width: 400px;
        width: 100%;
        border-radius: 15px;
        cursor: pointer;
        border: 2px solid rgba(52, 152, 219, 0.3);
      }
      
      .gif-container img:hover {
        filter: drop-shadow(0 0 20px rgba(52, 152, 219, 0.8));
        border-color: #3498db;
      }
      
      .buttons {
        margin: 30px 0;
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .btn {
        padding: 15px 30px;
        font-size: 16px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
      }
      
      .btn-back {
        background: linear-gradient(45deg, #3498db, #9b59b6);
        color: white;
        box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
      }
      
      .btn-back:hover {
        filter: drop-shadow(0 0 20px rgba(52, 152, 219, 1.0));
        transform: translateY(-2px);
      }
      
      .btn-blank {
        background: linear-gradient(45deg, #2980b9, #8e44ad);
        color: white;
        box-shadow: 0 4px 15px rgba(41, 128, 185, 0.3);
      }
      
      .btn-blank:hover {
        filter: drop-shadow(0 0 20px rgba(41, 128, 185, 1.0));
        transform: translateY(-2px);
      }
      
      @media (max-width: 600px) {
        .content {
          margin: 20px;
          padding: 30px 20px;
        }
        
        h1 {
          font-size: 2.5rem;
        }
        
        .buttons {
          flex-direction: column;
          align-items: center;
        }
        
        .btn {
          width: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>404</h1>
      <p>Oops! The page you're looking for doesn't exist.</p>
      
      <div class="gif-container">
        <img src="https://media.giphy.com/media/C21GGDOpKT6Z4VuXyn/giphy.gif" alt="404 Error">
      </div>
      
      <div class="buttons">
        <a href="/" class="btn btn-back">Go Home</a>
        <a href="/blog" class="btn btn-blank">View Blog</a>
      </div>
    </div>
  </body>
</html>
